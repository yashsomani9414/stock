name: Daily S&P 500 Fetch

# Trigger: daily at 5 PM PST (01:00 UTC next day) + manual trigger
on:
  schedule:
    - cron: '0 01 * * *'  # 5 PM PST
  workflow_dispatch:       # allows manual trigger from GitHub UI

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Setup Python 3.10.13
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10.13

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run the fetch script
      - name: Run fetch script
        run: |
          python fetch_sp500.py

      # 5. Commit and push updated sp500_data.json
      - name: Commit and push updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sp500_data.json
          git commit -m "Update S&P 500 data" || echo "No changes to commit"
          git push https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
