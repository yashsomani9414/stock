name: Daily S&P 500 Fetch

on:
  schedule:
    # Every day at 01:00 UTC (roughly 5 PM PST)
    - cron: '0 01 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetch script
        run: |
          python fetch_sp500.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sp500_data.json
          git commit -m "Update S&P 500 data [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger live site refresh
        run: |
          curl -X GET "https://stock-732120165537.europe-west1.run.app/api/refresh?force=true"
