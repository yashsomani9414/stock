name: Daily S&P 500 Fetch

on:
  schedule:
    # Run at 2 PM PT every weekday (Mon-Fri)
    # During PDT (Mar-Nov): 2 PM PT = 21:00 UTC
    # During PST (Nov-Mar): 2 PM PT = 22:00 UTC
    # We run at both times; the timezone check ensures only one executes
    - cron: '0 21 * * 1-5'
    - cron: '0 22 * * 1-5'
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hour timeout for the full fetch

    steps:
      - name: Timezone Check
        id: tz_check
        run: |
          PT_HOUR=$(TZ='America/Los_Angeles' date +%H)
          PT_DOW=$(TZ='America/Los_Angeles' date +%u)
          echo "Current PT Hour: $PT_HOUR, Day of Week: $PT_DOW"
          # Only proceed if it's 2 PM PT (hour 14) or manual trigger
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual run triggered. Proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [ "$PT_HOUR" -eq 14 ]; then
            echo "It is 2 PM PT (current hour: ${PT_HOUR}). Proceeding with daily fetch."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "It is entirely the wrong time (${PT_HOUR}:00 PT). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.tz_check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.tz_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.tz_check.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetch script
        if: steps.tz_check.outputs.skip != 'true'
        run: |
          python fetch_sp500.py
        timeout-minutes: 150

      - name: Run paper trade update
        if: steps.tz_check.outputs.skip != 'true'
        run: |
          python paper_trade.py auto
        timeout-minutes: 5

      - name: Commit and push updated data
        if: steps.tz_check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "Daily data refresh $(TZ='America/Los_Angeles' date '+%Y-%m-%d %H:%M PT') [skip ci]" && git pull --rebase origin main && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
